# ==============================
# CATALOG - Gain Project
# ==============================
#
# Convention de nommage :
#   Tous les datasets portent le suffixe _tonal ou _vocal
#   pour éviter toute ambiguïté.
#
# Couches Kedro :
#   01_raw          -> Données brutes générées
#   02_intermediate -> Données nettoyées
#   03_primary      -> Features et targets
#   05_model_input  -> Train/test splits
#   06_models       -> Modèles entraînés
#   07_model_output -> Prédictions
#   08_reporting    -> Métriques et rapports
# ==============================


# ============================================================
#                        TONAL
# ============================================================

# --- Generation ---

raw_tonal_data:
  type: pandas.CSVDataset
  filepath: data/01_raw/tonal_exams.csv
  save_args:
    index: False

# --- Data Engineering ---

validated_tonal_data:
  type: MemoryDataset

numeric_tonal_data:
  type: MemoryDataset

clean_tonal_data:
  type: pandas.CSVDataset
  filepath: data/02_intermediate/clean_tonal_exams.csv
  save_args:
    index: False

# --- Feature Engineering ---

X_tonal:
  type: pandas.CSVDataset
  filepath: data/03_primary/X_tonal.csv
  save_args:
    index: False

y_tonal:
  type: pandas.CSVDataset
  filepath: data/03_primary/y_tonal.csv
  save_args:
    index: False

# --- Training ---

X_train_tonal:
  type: pandas.CSVDataset
  filepath: data/05_model_input/X_train_tonal.csv
  save_args:
    index: False

X_test_tonal:
  type: pandas.CSVDataset
  filepath: data/05_model_input/X_test_tonal.csv
  save_args:
    index: False

y_train_tonal:
  type: pandas.CSVDataset
  filepath: data/05_model_input/y_train_tonal.csv
  save_args:
    index: False

y_test_tonal:
  type: pandas.CSVDataset
  filepath: data/05_model_input/y_test_tonal.csv
  save_args:
    index: False

xgb_model_tonal:
  type: pickle.PickleDataset
  filepath: data/06_models/xgb_model_tonal.pkl

# --- Inference ---

inference_input_tonal:
  type: pandas.CSVDataset
  filepath: data/01_raw/inference_input_tonal.csv

validated_input_tonal:
  type: MemoryDataset

numeric_input_tonal:
  type: MemoryDataset

clean_input_tonal:
  type: MemoryDataset

invalid_rows_tonal:
  type: json.JSONDataset
  filepath: data/08_reporting/tonal_invalid_rows.json

inference_predictions_tonal:
  type: pandas.CSVDataset
  filepath: data/07_model_output/tonal_predictions.csv
  save_args:
    index: False


