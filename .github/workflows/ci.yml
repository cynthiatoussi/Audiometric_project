name: CI/CD PrediGain

on:
  push:
    branches: [main, secondary]
  pull_request:
    branches: [main]

# Force l'utilisation de Node 24 pour éviter les warnings de dépréciation
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ========================================
  # JOB 1 : Tests
  # ========================================
  tests:
    name: Tests pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Installer le projet en mode dev
        run: pip install -e .

      - name: Lancer les tests avec couverture
        # On regroupe en une commande pour plus de clarté
        run: pytest tests/ -v --tb=short --cov=gain_project --cov-report=term-missing

  # ========================================
  # JOB 2 : Docker Build
  # ========================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t gain-project:latest .

      - name: Vérifier que l'image existe
        run: docker images gain-project:latest