# ==============================
# CI/CD — PrediGain
# ==============================
#
# Déclenché à chaque push ou pull request sur main et secondary.
#
# Étapes :
#   1. Checkout du code
#   2. Installation Python + dépendances
#   3. Installation du projet en mode dev
#   4. Exécution de tous les tests pytest
#   5. Build de l'image Docker (vérifie que ça compile)
#
# Si un test échoue → le pipeline est rouge → le merge est bloqué.

name: CI/CD PrediGain

on:
  push:
    branches: [main, secondary]
  pull_request:
    branches: [main]

jobs:

  # ========================================
  # JOB 1 : Tests
  # ========================================
  tests:
    name: Tests pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Installer le projet en mode dev
        run: pip install -e .

      - name: Lancer les tests
        run: pytest tests/ -v --tb=short

      - name: Lancer les tests avec couverture
        run: pytest tests/ --cov=gain_project --cov-report=term-missing

  # ========================================
  # JOB 2 : Docker Build
  # ========================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: tests    # Ne build que si les tests passent

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t gain-project:latest .

      - name: Vérifier que l'image existe
        run: docker images gain-project:latest